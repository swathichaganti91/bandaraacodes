name: Deploy Backend and Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  BACKEND_INSTANCE_ID: i-0bf4f02e6b59bcdb7
  FRONTEND_INSTANCE_ID: i-09beef907e7064863

jobs:
  # -------------------------------------------------------
  # DEPLOY BACKEND
  # -------------------------------------------------------
  deploy-backend:
    name: Deploy Backend (Port 5000)
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Backend EC2 via SSM
        run: |
          aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids ${{ env.BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend app" \
            --parameters commands='[
              "set -e",
              "echo === Stopping existing backend if running ===",
              "pkill -f python3 || true",
              "echo === Installing dependencies ===",
              "sudo yum install -y python3-pip git",
              "echo === Cloning or updating repo ===",
              "if [ -d /home/ec2-user/bandaraacodes ]; then cd /home/ec2-user/bandaraacodes && git pull; else git clone https://github.com/swathichaganti91/bandaraacodes.git /home/ec2-user/bandaraacodes; fi",
              "echo === Writing .env file ===",
              "echo DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} > /home/ec2-user/bandaraacodes/backend/.env",
              "echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> /home/ec2-user/bandaraacodes/backend/.env",
              "echo === Installing Python requirements ===",
              "pip3 install -r /home/ec2-user/bandaraacodes/backend/requirements.txt",
              "echo === Starting backend app on port 5000 ===",
              "cd /home/ec2-user/bandaraacodes/backend && nohup python3 app.py > /home/ec2-user/backend.log 2>&1 &",
              "echo === Backend deployed successfully ==="
            ]' \
            --output text \
            --query "Command.CommandId" > /tmp/backend_command_id.txt

          COMMAND_ID=$(cat /tmp/backend_command_id.txt)
          echo "Backend SSM Command ID: $COMMAND_ID"

          echo "Waiting for backend command to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ env.BACKEND_INSTANCE_ID }} \
            --region ${{ env.AWS_REGION }}

          echo "=== Backend Command Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ env.BACKEND_INSTANCE_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query '{Status:Status, Output:StandardOutputContent, Error:StandardErrorContent}' \
            --output json

  # -------------------------------------------------------
  # DEPLOY FRONTEND
  # -------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Port 80)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Frontend EC2 via SSM
        run: |
          aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids ${{ env.FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend app" \
            --parameters commands='[
              "set -e",
              "echo === Stopping existing frontend if running ===",
              "pkill -f python3 || true",
              "echo === Installing dependencies ===",
              "sudo yum install -y python3-pip python3 git",
              "echo === Cloning or updating repo ===",
              "if [ -d /home/ec2-user/bandaraacodes ]; then cd /home/ec2-user/bandaraacodes && git pull; else git clone https://github.com/swathichaganti91/bandaraacodes.git /home/ec2-user/bandaraacodes; fi",
              "echo === Creating virtual environment ===",
              "python3 -m venv /home/ec2-user/bandaraacodes/frontend/venv",
              "echo === Installing Python requirements ===",
              "/home/ec2-user/bandaraacodes/frontend/venv/bin/pip install -r /home/ec2-user/bandaraacodes/frontend/requirements.txt",
              "echo === Writing .env file ===",
              "echo DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} > /home/ec2-user/bandaraacodes/frontend/.env",
              "echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> /home/ec2-user/bandaraacodes/frontend/.env",
              "echo API_URL=${{ secrets.API_URL }} >> /home/ec2-user/bandaraacodes/frontend/.env",
              "echo === Ensuring templates directory exists ===",
              "mkdir -p /home/ec2-user/bandaraacodes/frontend/templates",
              "echo === Starting frontend app on port 80 ===",
              "cd /home/ec2-user/bandaraacodes/frontend && sudo /home/ec2-user/bandaraacodes/frontend/venv/bin/python3 app.py > /home/ec2-user/frontend.log 2>&1 &",
              "echo === Frontend deployed successfully ==="
            ]' \
            --output text \
            --query "Command.CommandId" > /tmp/frontend_command_id.txt

          COMMAND_ID=$(cat /tmp/frontend_command_id.txt)
          echo "Frontend SSM Command ID: $COMMAND_ID"

          echo "Waiting for frontend command to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ env.FRONTEND_INSTANCE_ID }} \
            --region ${{ env.AWS_REGION }}

          echo "=== Frontend Command Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ env.FRONTEND_INSTANCE_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query '{Status:Status, Output:StandardOutputContent, Error:StandardErrorContent}' \
            --output json
